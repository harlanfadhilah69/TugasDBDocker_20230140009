spring.application.name=deploy

# Gunakan tanda '=' bukan ':' untuk properties
# Pastikan tidak ada spasi setelah tanda ':' di dalam kurung kurawal
spring.datasource.url=${DB_URL:jdbc:postgresql://pg-deploy3-ardian-2a57.g.aivencloud.com:18563/defaultdb?sslmode=require}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:AVNS_RDRyDz-9TbFsNFQEurV}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
